server {
    listen 80; // Mostra a porta 80 para conexões HTTP
    server_name _; // Aceita solicitações para qualquer nome de host

    root /usr/share/nginx/html; // Define o diretório raiz onde os arquivos estáticos do frontend estão localizados
    index index.html; // Define o arquivo de índice padrão para servir quando a raiz for acessada

    # Proxy /api requests to the backend service
    location /api { 
        proxy_pass http://backend:3000; // Redireciona as solicitações que começam com /api para o serviço backend na porta 3000
        proxy_http_version 1.1; // Define a versão HTTP usada para comunicação com o backend
        proxy_set_header Host $host; // Preserva o cabeçalho Host original da solicitação
        proxy_set_header X-Real-IP $remote_addr; // Adiciona o endereço IP do cliente original ao cabeçalho X-Real-IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; // Adiciona o endereço IP do cliente original ao cabeçalho X-Forwarded-For
        proxy_set_header X-Forwarded-Proto $scheme; // Adiciona o esquema (http ou https) ao cabeçalho X-Forwarded-Proto
    }

    # SPA fallback — always serve index.html for Angular routes
    location / {
        try_files $uri $uri/ /index.html; // Tenta servir o arquivo solicitado, se não existir, serve index.html para permitir que o Angular gerencie as rotas do lado do cliente
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y; // Define o tempo de expiração para os arquivos estáticos como 1 ano
        add_header Cache-Control "public, immutable"; // Adiciona um cabeçalho Cache-Control para indicar que os arquivos são públicos e imutáveis
        try_files $uri =404; // Tenta servir o arquivo solicitado, se não existir, retorna um erro 404
    }
}
